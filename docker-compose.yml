version: "3.9"

services:
  api:
    image: ${APP_IMAGE:-ghcr.io/g2bc/lumm-server}:${IMAGE_TAG:-latest}
    container_name: lumm-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - default
      - redis_shared
      - minio_default
      - g2bc_db

networks:
  redis_shared:
    external: true
    name: redis-shared
  minio_default:
    external: true
    name: minio_default
  g2bc_db:
    external: true
    name: g2bc_db
