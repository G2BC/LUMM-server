name: Sync MycoBank

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: sync-mycobank
  cancel-in-progress: true

jobs:
  sync:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --user 1000:1000
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python version
        run: python --version

      - name: Install dependencies
        run: |
          pip install --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run sync script
        run: ~/.local/bin/uv run python scripts/sync_mycobank.py
