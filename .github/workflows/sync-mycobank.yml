name: Sync MycoBank

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: sync-mycobank
  cancel-in-progress: true

jobs:
  sync:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sync script
        run: |
          docker run --rm \
            --user 1000:1000 \
            --network host \
            -v "${{ github.workspace }}:/app:ro" \
            -w /app \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e APP_ENV=production \
            python:3.12-slim \
            sh -c "pip install -q uv && uv sync --frozen --no-dev && uv run python scripts/sync_mycobank.py"
