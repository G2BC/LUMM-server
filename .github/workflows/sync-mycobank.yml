name: Sync MycoBank

on:
  workflow_dispatch:
    inputs:
      lumm_id:
        description: "LUMM species ID(s) separados por vírgula, ex: 1 ou 1,2,3 (deixe vazio para sincronizar todas)"
        required: false
        type: string
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: sync-mycobank
  cancel-in-progress: true

jobs:
  sync:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Fix workspace permissions
        run: docker run --rm -v "${{ github.workspace }}:/workspace" python:3.12-slim chown -R "$(id -u):$(id -g)" /workspace

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sync script
        run: |
          docker run --rm \
            --user 1000:1000 \
            -v "${{ github.workspace }}:/app:ro" \
            -v "/tmp/lumm:/tmp/lumm" \
            -w /app \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e APP_ENV=production \
            -e PYTHONUNBUFFERED=1 \
            -e LUMM_ID="${{ inputs.lumm_id }}" \
            python:3.12-slim \
            sh -c "pip install -q --user uv && ~/.local/bin/uv sync --frozen --no-dev && ~/.local/bin/uv run python scripts/sync_mycobank.py"
