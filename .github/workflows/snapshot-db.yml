name: Snapshot DB

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão do BD (ex: 1)"
        required: true
        default: "1"
  # schedule:
  #   - cron: "0 4 1 * *"

permissions:
  contents: read

concurrency:
  group: snapshot-db
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network lumm-ci
    timeout-minutes: 30
    env:
      DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
      LUMM_DB_VERSION: ${{ inputs.version }}
      APP_ENV: production
      UV_LINK_MODE: copy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run snapshot script
        run: ~/.local/bin/uv run python scripts/snapshot_db.py

      - name: Cleanup
        if: always()
        run: rm -rf ~/.local
