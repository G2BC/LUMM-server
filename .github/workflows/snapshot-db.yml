name: Snapshot DB

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão do BD (ex: 1)"
        required: true
        default: "1"
  # schedule:
  #   - cron: "0 4 1 * *"

permissions:
  contents: read

concurrency:
  group: snapshot-db
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network minio_default
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_SECURE: ${{ secrets.MINIO_SECURE }}
      MINIO_REGION: ${{ secrets.MINIO_REGION }}
      MINIO_DB_BUCKET: ${{ secrets.MINIO_DB_BUCKET }}
      LUMM_DB_VERSION: ${{ inputs.version }}
      APP_ENV: production
      UV_LINK_MODE: copy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Test MinIO auth
        run: |
          python - <<'PY'
          import os
          import boto3
          from botocore.config import Config

          endpoint = os.environ["MINIO_ENDPOINT"].rstrip("/")
          access_key = os.environ["MINIO_ACCESS_KEY"].strip()
          secret_key = os.environ["MINIO_SECRET_KEY"].strip()

          print("endpoint:", endpoint)
          print("access_key length:", len(access_key))
          print("secret_key length:", len(secret_key))

          client = boto3.client(
              "s3",
              endpoint_url=endpoint,
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              region_name=os.getenv("MINIO_REGION", "us-east-1"),
              config=Config(
                  signature_version="s3v4",
                  s3={"addressing_style": "path"},
              ),
          )

          print("listing buckets...")
          print(client.list_buckets())
          PY

      - name: Run snapshot script
        run: ~/.local/bin/uv run python scripts/snapshot_db.py

      - name: Cleanup
        if: always()
        run: rm -rf ~/.local
