name: Sync speciesLink

on:
  workflow_dispatch:
    inputs:
      lumm_id:
        description: "LUMM species ID(s) separados por vírgula, ex: 1 ou 1,2,3 (deixe vazio para sincronizar todas)"
        required: false
        type: string

  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

concurrency:
  group: sync-specieslink
  cancel-in-progress: true

jobs:
  sync:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network redis-shared
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SPECIESLINK_API_KEY: ${{ secrets.SPECIESLINK_API_KEY }}
      APP_ENV: production
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      LUMM_ID: ${{ inputs.lumm_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run sync script
        run: ~/.local/bin/uv run python scripts/sync_specieslink.py
