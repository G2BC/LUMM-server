name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: "${{ !startsWith(github.event.pull_request.title, 'chore(main): release') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize GHCR owner
        id: image_meta
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

      - name: Build image only (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/${{ steps.image_meta.outputs.owner }}/lumm-server:ci

  scan:
    if: "${{ !startsWith(github.event.pull_request.title, 'chore(main): release') }}"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Check lockfile
        run: uv lock --check

      - name: Ensure dirs
        run: mkdir -p artifacts

      - name: Normalize GHCR owner
        id: image_meta
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy CLI
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy fs
        run: |
          trivy fs . \
            --scanners vuln,secret \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            -f table -o artifacts/trivy-fs.txt || true

          trivy fs . \
            --scanners vuln,secret \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            -f json -o artifacts/trivy-fs.json || echo '{}' > artifacts/trivy-fs.json

      - name: Trivy image
        run: |
          docker build -t ghcr.io/${{ steps.image_meta.outputs.owner }}/lumm-server:ci .

          trivy image ghcr.io/${{ steps.image_meta.outputs.owner }}/lumm-server:ci \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            -f table -o artifacts/trivy-image.txt || true

          trivy image ghcr.io/${{ steps.image_meta.outputs.owner }}/lumm-server:ci \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            -f json -o artifacts/trivy-image.json || echo '{}' > artifacts/trivy-image.json

      - name: Trivy config
        run: |
          trivy config . \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            -f table -o artifacts/trivy-config.txt || true

          trivy config . \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            -f json -o artifacts/trivy-config.json || echo '{}' > artifacts/trivy-config.json

      - name: Calculate EPV
        run: |
          mkdir -p artifacts
          C=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' artifacts/trivy-image.json)
          H=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' artifacts/trivy-image.json)
          M=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' artifacts/trivy-image.json)
          L=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="LOW")] | length' artifacts/trivy-image.json)
          EPV=$(echo "scale=2; (1.0*$C) + (0.75*$H) + (0.5*$M) + (0.25*$L)" | bc)
          echo "$EPV" > artifacts/epv.txt
          if [ ! -f artifacts/epv.csv ]; then echo 'date,commit,epv' > artifacts/epv.csv; fi
          printf '%s,%s,%s\n' "$(date +%F)" "${GITHUB_SHA::7}" "$EPV" >> artifacts/epv.csv

      - name: Generate EPV graph
        run: |
          uv run --with matplotlib --with pandas --with seaborn python scripts/plot_epv.py

      - name: Check EPV threshold
        run: |
          EPV=$(< artifacts/epv.txt)
          echo "🔎 EPV detected: $EPV (threshold: $EPV_THRESHOLD)"
          RESULT=$(echo "$EPV >= $EPV_THRESHOLD" | bc)

          C=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' artifacts/trivy-image.json)
          H=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' artifacts/trivy-image.json)
          M=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' artifacts/trivy-image.json)
          L=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="LOW")] | length' artifacts/trivy-image.json)

          echo "### 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity  | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🟥 CRITICAL |   $C   |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟧 HIGH     |   $H   |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟨 MEDIUM   |   $M   |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟦 LOW      |   $L   |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **EPV**: \`$EPV\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Threshold**: \`$EPV_THRESHOLD\`" >> $GITHUB_STEP_SUMMARY

          if [ "$RESULT" -eq 1 ]; then
            echo "- ❌ **Rejected**: EPV >= threshold" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "- ✅ **Approved**: EPV below threshold" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          EPV_THRESHOLD: ${{ vars.EPV_THRESHOLD || 5 }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-security-scan
          path: artifacts/*

      - name: Clean workspace
        if: always()
        run: |
          docker container prune -f
          docker volume prune -f
          rm -rf artifacts/
