name: Importar status IUCN Red List

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: import-iucn-red-list-status
  cancel-in-progress: true

jobs:
  import:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      IUCN_API_KEY: ${{ secrets.IUCN_API_KEY }}
      APP_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Python from runner
        shell: bash
        run: |
          if command -v python3.9 >/dev/null 2>&1; then
            PYTHON_BIN=python3.9
          elif command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN=python3
          else
            echo "Python not found on self-hosted runner"
            exit 1
          fi
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          "$PYTHON_BIN" --version

      - name: Install dependencies
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install -r requirements.txt

      - name: Run import script
        run: "$PYTHON_BIN" scripts/import_iucn_red_list_status.py
