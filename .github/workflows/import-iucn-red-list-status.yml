name: Importar status IUCN Red List

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: import-iucn-red-list-status
  cancel-in-progress: true

jobs:
  import:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      IUCN_API_KEY: ${{ secrets.IUCN_API_KEY }}
      APP_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import script
        run: python scripts/import_iucn_red_list_status.py
