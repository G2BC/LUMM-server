name: Import IUCN Red List Status

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: import-iucn-red-list-status
  cancel-in-progress: true

jobs:
  import:
    runs-on: self-hosted
    container:
      image: python:3.9.19-slim
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      IUCN_API_KEY: ${{ secrets.IUCN_API_KEY }}
      APP_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run import script
        run: python scripts/import_iucn_red_list_status.py
