name: Sync BOLD

on:
  workflow_dispatch:
    inputs:
      lumm_id:
        description: "LUMM species ID(s) separados por vírgula, ex: 1 ou 1,2,3 (deixe vazio para sincronizar todas)"
        required: false
        type: string
      geo_query:
        description: "Filtro geográfico BOLD opcional, ex: geo:country/ocean:Brazil"
        required: false
        type: string

  schedule:
    - cron: "0 3 * * 5"

permissions:
  contents: read

concurrency:
  group: sync-bold
  cancel-in-progress: true

jobs:
  sync:
    runs-on: self-hosted
    container:
      image: python:3.12-slim
      options: --network lumm-ci
    timeout-minutes: 60
    env:
      DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
      APP_ENV: production
      PYTHONUNBUFFERED: "1"
      UV_LINK_MODE: copy
      LUMM_ID: ${{ inputs.lumm_id }}
      BOLD_GEO_QUERY: ${{ inputs.geo_query }}
      BOLD_MAX_WORKERS: "1"
      BOLD_SLEEP_BETWEEN_REQUESTS: "3"
      BOLD_MAX_RECORDS_PER_SPECIES: "20000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -q --user uv
          ~/.local/bin/uv sync --frozen --no-dev

      - name: Run sync script
        run: ~/.local/bin/uv run python scripts/sync_bold.py
