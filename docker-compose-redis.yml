services:
  redis:
    image: redis:7.4-alpine
    container_name: g2bc-redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      [
        "sh",
        "-c",
        'redis-server --appendonly yes --save 60 1000 --requirepass "$$REDIS_PASSWORD" --maxmemory-policy allkeys-lru',
      ]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - redis_shared

volumes:
  redis_data:

networks:
  redis_shared:
    name: redis-shared
